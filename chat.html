<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ollama Chat</title>
    <link rel="stylesheet" href="libs/katex/katex.min.css">
    <style>
      body { margin:0; background: #0a0a0a; color: #f5f5f5; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { padding: 16px; background: #141414; display: flex; flex-direction: column; gap: 12px; }
    .top-row { display: flex; justify-content: space-between; align-items: center; }
    select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 6px; font-size: 16px; outline: none; }
    .tabs { display: flex; gap: 8px; }
    .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 16px; border: 1px solid #333; background: #1a1a1a; color: #888; transition: all 0.15s; }
    .tab.active { background: #fff; color: #000; border-color: #fff; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 15px; color: #888; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 12px 16px; border-radius: 8px; max-width: 75%; font-size: 16px; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { background: #1f1f1f; align-self: flex-end; }
    .msg.assistant { background: #141414; align-self: flex-start; }
    .msg.error { background: rgba(239,68,68,0.2); color: #ef4444; }
    /* Markdown rendered content styles */
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3, .msg.assistant h4 { margin: 12px 0 8px; font-weight: 600; }
    .msg.assistant h1 { font-size: 1.5em; border-bottom: 1px solid #333; padding-bottom: 6px; }
    .msg.assistant h2 { font-size: 1.3em; }
    .msg.assistant h3 { font-size: 1.1em; }
    .msg.assistant h4 { font-size: 1em; }
    .msg.assistant p { margin: 8px 0; line-height: 1.6; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 8px 0; }
    .msg.assistant li { margin: 4px 0; }
    .msg.assistant code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .msg.assistant pre { background: #1a1a1a; border-radius: 8px; padding: 12px; margin: 8px 0; overflow-x: auto; }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant blockquote { border-left: 3px solid #555; padding-left: 12px; margin: 8px 0; color: #aaa; }
    .msg.assistant table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .msg.assistant th, .msg.assistant td { border: 1px solid #333; padding: 8px; text-align: left; }
    .msg.assistant th { background: #1a1a1a; }
    .msg.assistant a { color: #7C3AED; text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.assistant img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .input-area { padding: 16px; background: #141414; display: flex; gap: 12px; }
    textarea { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 12px; resize: none; font-size: 16px; outline: none; }
    textarea:focus { border-color: #666; }
    button { background: #fff; color: #000; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-weight: 600; font-size: 16px; white-space: nowrap; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    /* Translate panel */
    #translate-panel { flex: 1; display: none; flex-direction: column; gap: 8px; padding: 16px; overflow: hidden; }
    .tr-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .tr-row label { font-size: 15px; color: #888; }
    .tr-row select { width: auto; padding: 6px 12px; }
    .tr-panes { flex: 1; display: flex; gap: 12px; min-height: 0; }
    .tr-pane { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .tr-pane label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .tr-pane textarea { flex: 1; min-height: 120px; font-family: inherit; }
    #tr-output { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; font-size: 16px; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; min-height: 120px; color: #f5f5f5; }
    .tr-actions { display: flex; gap: 8px; justify-content: flex-end; }
    /* Status clickable */
    .status { cursor: pointer; }
    /* Thinking toggle */
    #thinking-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7C3AED;
    }
    #thinking-toggle span {
      font-size: 14px;
      color: #888;
      user-select: none;
    }
    /* Port config modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #141414; border: 1px solid #333; border-radius: 12px; padding: 24px; min-width: 320px; }
    .modal h3 { margin: 0 0 16px; font-size: 18px; color: #f5f5f5; }
    .modal label { display: block; font-size: 15px; color: #888; margin-bottom: 6px; }
    .modal input { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 8px 12px; font-size: 16px; outline: none; box-sizing: border-box; }
    .modal input:focus { border-color: #666; }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal .actions button { padding: 8px 16px; }
    .modal .actions button.secondary { background: #333; color: #fff; }
    /* Left sidebar */
    .sidebar-trigger { position: fixed; left: 0; top: 0; bottom: 0; width: 8px; z-index: 100; }
    .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #141414; border-right: 1px solid #333; z-index: 101; display: flex; flex-direction: column; transition: left 0.2s ease; }
    .sidebar.open { left: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #333; display: flex; gap: 8px; }
    .sidebar-btn { flex: 1; padding: 8px 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 15px; text-align: center; }
    .sidebar-btn:hover { background: #222; }
    .sidebar-btn.active { background: #fff; color: #000; border-color: #fff; }
    .sidebar-history { flex: 1; overflow-y: auto; padding: 8px; }
    .sidebar-history .item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 15px; color: #ccc; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-history .item:hover { background: #1a1a1a; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid #333; display: flex; justify-content: center; }
    .sidebar-footer button { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 6px; }
    .sidebar-footer button:hover { background: #1a1a1a; color: #fff; }
  </style>
</head>
<body>
  <header>
    <div class="top-row">
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="tabs">
          <div class="tab active" data-tab="chat">Chat</div>
          <div class="tab" data-tab="translate">Translate</div>
        </div>
        <select id="model" style="margin-left:24px;"><option>Loading models...</option></select>
        <div id="thinking-toggle" style="display:none; align-items:center; gap:6px; margin-left:12px;">
          <label style="font-size:14px; color:#888; cursor:pointer; display:flex; align-items:center; gap:4px;">
            <input type="checkbox" id="thinking-checkbox" style="cursor:pointer;">
            <span>Thinking</span>
          </label>
        </div>
      </div>
      <div class="status">
        <span class="dot yellow" id="dot"></span>
        <span id="status">Connecting...</span>
      </div>
    </div>
  </header>  <!-- Chat -->
  <div id="msgs"></div>
  <div class="input-area" id="chat-input">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send" disabled>Send</button>
  </div>
  <!-- Translate -->
  <div id="translate-panel">
    <div class="tr-row">
      <label>Source language</label>
      <select id="tr-src-lang">
        <option value="auto" selected>Auto-detect (自动识别)</option>
        <option value="Chinese">Chinese (中文)</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese (日本語)</option>
        <option value="Korean">Korean (한국어)</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
        <option value="Arabic">Arabic</option>
        <option value="Thai">Thai</option>
        <option value="Vietnamese">Vietnamese</option>
      </select>
      <span style="color:#666;font-size:15px;">→</span>
      <label>Target language</label>
      <select id="tr-lang">
        <option value="Chinese" selected>Chinese (中文)</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese (日本語)</option>
        <option value="Korean">Korean (한국어)</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
        <option value="Arabic">Arabic</option>
        <option value="Thai">Thai</option>
        <option value="Vietnamese">Vietnamese</option>
      </select>
    </div>
    <div class="tr-panes">
      <div class="tr-pane">
        <label>Source text</label>
        <textarea id="tr-input" placeholder="Paste text to translate..."></textarea>
      </div>
      <div class="tr-pane">
        <label>Translation</label>
        <div id="tr-output"></div>
      </div>
    </div>
    <div class="tr-actions">
      <button id="tr-btn" disabled>Translate</button>
    </div>
  </div>

  <!-- Port Config Modal -->
  <div class="modal-overlay" id="port-modal">
    <div class="modal">
      <h3>Configure Ollama Port</h3>
      <label>Port (default: 11434)</label>
      <input id="port-input" type="number" placeholder="11434" min="1" max="65535" />
      <div class="actions">
        <button class="secondary" id="port-cancel">Cancel</button>
        <button id="port-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Left Sidebar Trigger -->
  <div class="sidebar-trigger" id="sidebar-trigger"></div>

  <!-- Left Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-btn" id="btn-anonymous">Anonymous</button>
      <button class="sidebar-btn" id="btn-new-chat">New Chat</button>
    </div>
    <div class="sidebar-history" id="sidebar-history">
      <!-- History items will be added here -->
    </div>
    <div class="sidebar-footer">
      <button id="btn-settings" title="Settings">⚙️</button>
    </div>
  </div>

  <script src="libs/katex/katex.min.js"></script>
  <script src="libs/katex/auto-render.min.js"></script>
  <script src="render_functions.js"></script>
  <script src="chat.js"></script>
</body>
</html>
