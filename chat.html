<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ollama Chat</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: #f5f5f5; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 16px; background: #141414; display: flex; flex-direction: column; gap: 12px; }
    .top-row { display: flex; justify-content: space-between; align-items: center; }
    select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
    .tabs { display: flex; gap: 8px; }
    .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; border: 1px solid #333; background: #1a1a1a; color: #888; transition: all 0.15s; }
    .tab.active { background: #fff; color: #000; border-color: #fff; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 12px 16px; border-radius: 8px; max-width: 75%; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { background: #1f1f1f; align-self: flex-end; }
    .msg.assistant { background: #141414; align-self: flex-start; }
    .msg.error { background: rgba(239,68,68,0.2); color: #ef4444; }
    .input-area { padding: 16px; background: #141414; display: flex; gap: 12px; }
    textarea { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 12px; resize: none; font-size: 14px; outline: none; }
    textarea:focus { border-color: #666; }
    button { background: #fff; color: #000; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-weight: 600; font-size: 14px; white-space: nowrap; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    /* Translate panel */
    #translate-panel { flex: 1; display: none; flex-direction: column; gap: 8px; padding: 16px; overflow: hidden; }
    .tr-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .tr-row label { font-size: 13px; color: #888; }
    .tr-row select { width: auto; padding: 6px 12px; }
    .tr-panes { flex: 1; display: flex; gap: 12px; min-height: 0; }
    .tr-pane { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .tr-pane label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .tr-pane textarea { flex: 1; min-height: 120px; font-family: inherit; }
    #tr-output { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; min-height: 120px; color: #f5f5f5; }
    .tr-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>
  <header>
    <div class="top-row">
      <div class="tabs">
        <div class="tab active" data-tab="chat">Chat</div>
        <div class="tab" data-tab="translate">Translate</div>
      </div>
      <div class="status">
        <span class="dot yellow" id="dot"></span>
        <span id="status">Connecting...</span>
      </div>
    </div>
    <div class="top-row">
      <select id="model"><option>Loading models...</option></select>
    </div>
  </header>
  <!-- Chat -->
  <div id="msgs">
    <div class="msg assistant">Connecting to Ollama at 127.0.0.1:11434&#10;&#10;Select a model and start chatting.</div>
  </div>
  <div class="input-area" id="chat-input">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send" disabled>Send</button>
  </div>
  <!-- Translate -->
  <div id="translate-panel">
    <div class="tr-row">
      <label>Source language</label>
      <select id="tr-src-lang">
        <option value="auto" selected>Auto-detect (自动识别)</option>
        <option value="Chinese">Chinese (中文)</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese (日本語)</option>
        <option value="Korean">Korean (한국어)</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
        <option value="Arabic">Arabic</option>
        <option value="Thai">Thai</option>
        <option value="Vietnamese">Vietnamese</option>
      </select>
      <span style="color:#666;font-size:13px;">→</span>
      <label>Target language</label>
      <select id="tr-lang">
        <option value="Chinese" selected>Chinese (中文)</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese (日本語)</option>
        <option value="Korean">Korean (한국어)</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
        <option value="Arabic">Arabic</option>
        <option value="Thai">Thai</option>
        <option value="Vietnamese">Vietnamese</option>
      </select>
    </div>
    <div class="tr-panes">
      <div class="tr-pane">
        <label>Source text</label>
        <textarea id="tr-input" placeholder="Paste text to translate..."></textarea>
      </div>
      <div class="tr-pane">
        <label>Translation</label>
        <div id="tr-output"></div>
      </div>
    </div>
    <div class="tr-actions">
      <button id="tr-btn" disabled>Translate</button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
